<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Randevu Al</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#f0f2f5;--surface:#fff;--surface2:#f8f9fb;--border:#e4e7ec;--border-light:#f0f2f5;
      --text:#1a1d26;--text2:#3d4152;--muted:#8b919e;
      --primary:#5b5ff6;--primary-dark:#4a4ee0;--primary-light:#ededff;--primary-glow:rgba(91,95,246,.12);
      --green:#22c55e;--green-light:#dcfce7;--red:#ef4444;--red-light:#fef2f2;
      --radius:16px;--radius-sm:12px;--radius-xs:8px;
      --shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow:0 2px 8px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.1)
    }
    body{font-family:'Poppins',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
      background-image:radial-gradient(ellipse at 20% 0%,rgba(91,95,246,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(34,197,94,.04) 0%,transparent 50%)}
    [dir="rtl"]{direction:rtl;text-align:right}
    [dir="rtl"] .card{flex-direction:row-reverse}
    [dir="rtl"] .card-price{margin-left:0;margin-right:auto}
    [dir="rtl"] .step-title{flex-direction:row-reverse}
    [dir="rtl"] .summary-row{flex-direction:row-reverse}
    [dir="rtl"] .btn-back{flex-direction:row-reverse}
    [dir="rtl"] .date-scroll{direction:rtl}
    [dir="rtl"] .lang-select{left:16px;right:auto}

    .booking-container{max-width:460px;margin:0 auto;padding:20px 16px 60px;position:relative}

    .lang-select{position:absolute;top:20px;right:16px;display:flex;gap:4px;z-index:10}
    .lang-btn{width:36px;height:28px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--surface);cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);transition:all .2s;display:flex;align-items:center;justify-content:center;font-family:inherit}
    .lang-btn:hover{border-color:var(--primary);color:var(--primary)}
    .lang-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:var(--shadow-sm)}

    .brand-bar{text-align:center;padding:32px 0 24px}
    .brand-bar h1{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
    .brand-bar .subtitle{font-size:13px;color:var(--muted);margin-top:4px;font-weight:400}
    .brand-bar .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:99px;font-size:11px;font-weight:600;background:var(--primary-light);color:var(--primary);margin-top:10px;letter-spacing:.2px}
    .brand-bar .badge svg{width:12px;height:12px}
    .divider{height:1px;background:var(--border-light);margin-bottom:24px}

    .step-indicator{display:flex;gap:6px;margin-bottom:28px;padding:0 4px}
    .step-dot{flex:1;height:4px;border-radius:99px;background:var(--border);transition:all .4s ease}
    .step-dot.active{background:linear-gradient(135deg,var(--primary),var(--primary-dark));box-shadow:0 0 8px var(--primary-glow)}
    .step-dot.done{background:var(--green)}

    .step-title{font-size:16px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:10px;color:var(--text)}
    .step-title .num{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;box-shadow:0 2px 8px var(--primary-glow);flex-shrink:0}

    .card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all .25s ease;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)}
    .card:hover{border-color:var(--primary);box-shadow:var(--shadow),0 0 0 3px var(--primary-glow);transform:translateY(-1px)}
    .card.selected{border-color:var(--primary);background:var(--primary-light);box-shadow:0 0 0 3px var(--primary-glow)}
    .card-icon{width:44px;height:44px;border-radius:var(--radius-sm);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--border-light)}
    .card.selected .card-icon{background:var(--primary-glow);border-color:transparent}
    .card-info{flex:1;min-width:0}
    .card-info h3{font-size:14px;font-weight:600;color:var(--text)}
    .card-info p{font-size:12px;color:var(--muted);margin-top:2px;font-weight:400}
    .card-price{font-size:15px;font-weight:700;color:var(--primary);white-space:nowrap}
    .card-duration{font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}

    .time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
    .time-btn{padding:12px 4px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;box-shadow:var(--shadow-sm);font-family:inherit;color:var(--text2)}
    .time-btn:hover{border-color:var(--primary);background:var(--primary-light);transform:translateY(-1px)}
    .time-btn.selected{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-color:transparent;box-shadow:0 2px 8px var(--primary-glow)}

    .date-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
    .date-scroll::-webkit-scrollbar{display:none}
    .date-btn{min-width:68px;padding:12px 8px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;text-align:center;transition:all .2s;flex-shrink:0;box-shadow:var(--shadow-sm)}
    .date-btn:hover{border-color:var(--primary);transform:translateY(-1px)}
    .date-btn.selected{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-color:transparent;box-shadow:0 2px 12px var(--primary-glow)}
    .date-btn .day-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.65}
    .date-btn .day-num{font-size:20px;font-weight:800;margin:3px 0 1px}
    .date-btn .month{font-size:10px;font-weight:500;opacity:.7}

    .input-group{margin-bottom:16px}
    .input-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:.2px}
    .input-group input,.input-group textarea{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;outline:none;transition:all .25s;background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
    .input-group input:focus,.input-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
    .input-group input::placeholder,.input-group textarea::placeholder{color:var(--muted);font-weight:400}
    .input-group textarea{resize:vertical;min-height:64px}

    .btn-primary{width:100%;padding:15px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .25s;margin-top:12px;box-shadow:0 4px 12px var(--primary-glow);letter-spacing:.2px}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--primary-glow)}
    .btn-primary:active{transform:translateY(0)}
    .btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

    .btn-back{background:var(--surface);border:1.5px solid var(--border);color:var(--text2);padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:18px;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:all .2s;box-shadow:var(--shadow-sm)}
    .btn-back:hover{border-color:var(--primary);color:var(--primary)}

    .summary{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow)}
    .summary-row{display:flex;justify-content:space-between;padding:10px 0;font-size:13px;border-bottom:1px solid var(--border-light)}
    .summary-row:last-child{border:none}
    .summary-row span:first-child{color:var(--muted);font-weight:500}
    .summary-row span:last-child{font-weight:600;color:var(--text)}

    .success-screen{text-align:center;padding:48px 0}
    .success-icon{width:80px;height:80px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 4px 16px rgba(34,197,94,.15)}
    .success-icon svg{width:40px;height:40px;color:var(--green)}
    .success-screen h2{font-size:22px;font-weight:800;margin-bottom:8px;color:var(--text)}
    .success-screen p{font-size:14px;color:var(--muted);line-height:1.7}

    .loading{text-align:center;padding:60px 0;color:var(--muted);font-size:14px;font-weight:500}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}

    .error-msg{background:var(--red-light);border:1px solid #fecaca;color:var(--red);padding:13px 18px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:18px;font-weight:500;display:flex;align-items:center;gap:8px}
    .error-msg::before{content:'⚠';font-size:16px;flex-shrink:0}

    .footer{text-align:center;padding:36px 0 16px;font-size:11px;color:var(--muted);font-weight:400;letter-spacing:.3px}
    .footer a{color:var(--primary);font-weight:600;text-decoration:none;transition:opacity .2s}
    .footer a:hover{opacity:.7}

    .empty-state{text-align:center;padding:32px 0;color:var(--muted);font-size:13px;font-weight:500}
    .empty-state svg{width:48px;height:48px;color:var(--border);margin-bottom:12px}

    @media(max-width:400px){
      .time-grid{grid-template-columns:repeat(3,1fr)}
      .booking-container{padding:16px 12px 48px}
      .brand-bar h1{font-size:20px}
    }
  </style>
</head>

        err_captcha: 'إجابة التحقق خاطئة. حاول مرة أخرى.',
        err_cooldown: 'طلبات كثيرة. يرجى الانتظار دقيقة واحدة.',
        err_invalid: 'طلب غير صالح.',
        minutes: 'دقيقة',
        for_text: 'لـ',
        at_date: 'بتاريخ',
        days: ['أحد','إثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'],
        months: ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر']
      }
    };

    let lang = localStorage.getItem('booking_lang') || 'tr';
    function t(key) { return (T[lang] && T[lang][key]) || T.tr[key] || key; }
    function setLang(l) {
      lang = l;
      localStorage.setItem('booking_lang', l);
      document.documentElement.lang = l;
      document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
      render();
    }

    let state = {
      step: 1, isletme: null, hizmetler: [], calisanlar: [], saatler: [],
      seciliHizmet: null, seciliCalisan: null, seciliTarih: null, seciliSaat: null,
      musteriAd: '', musteriTel: '', musteriNot: '', hata: '', yukleniyor: false,
      captchaA: 0, captchaB: 0, captchaCevap: '', sonRandevuZaman: 0,
      otomatikCalisan: false, calisanSecildi: false
    };

    async function api(endpoint) {
      try { const r = await fetch(API + endpoint, {cache:'no-store'}); return await r.json(); }
      catch(e) { return {hata:'Connection error'}; }
    }
    async function apiPost(endpoint, body) {
      try {
        const r = await fetch(API + endpoint, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),cache:'no-store'});
        const text = await r.text();
        let data; try { data = JSON.parse(text); } catch(pe) { return {hata: text.substring(0,120)}; }
        if(!r.ok && !data.hata) data.hata = 'Error (' + r.status + ')';
        return data;
      } catch(e) { return {hata: e.message}; }
    }

    function yaklasTarihler() {
      const arr = [], bugun = new Date();
      for(let i=0;i<14;i++){
        const d = new Date(bugun); d.setDate(bugun.getDate()+i);
        arr.push({tarih:d.toISOString().slice(0,10), gun:t('days')[d.getDay()], gunNum:d.getDate(), ay:t('months')[d.getMonth()], bugun:i===0});
      }
      return arr;
    }

    function formatTarih(str) {
      if(!str) return '';
      const d = new Date(str+'T00:00:00');
      return `${d.getDate()} ${t('months')[d.getMonth()]} ${d.getFullYear()}, ${t('days')[d.getDay()]}`;
    }

    const svgCheck = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;
    const svgCal = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`;

    function render() {
      const app = document.getElementById('app');
      const s = state;
      if(!s.isletme) { app.innerHTML = `<div class="loading"><div class="spinner"></div></div>`; return; }

      let h = '';

      // Language selector
      h += `<div class="lang-select">
        <button class="lang-btn ${lang==='tr'?'active':''}" onclick="setLang('tr')">TR</button>
        <button class="lang-btn ${lang==='en'?'active':''}" onclick="setLang('en')">EN</button>
        <button class="lang-btn ${lang==='ar'?'active':''}" onclick="setLang('ar')">AR</button>
      </div>`;

      // Brand
      h += `<div class="brand-bar">
        <h1>${s.isletme.isim||t('online_booking')}</h1>
        ${s.isletme.adres?`<div class="subtitle">${s.isletme.adres}${s.isletme.ilce?' · '+s.isletme.ilce:''}</div>`:''}
        <div class="badge">${svgCal} ${t('online_booking')}</div>
      </div><div class="divider"></div>`;

      // Steps
      h += '<div class="step-indicator">';
      for(let i=1;i<=5;i++) h += `<div class="step-dot ${s.step>i?'done':''} ${s.step===i?'active':''}"></div>`;
      h += '</div>';

      if(s.hata) h += `<div class="error-msg">${s.hata}</div>`;

      // Step 1
      if(s.step===1) {
        h += `<div class="step-title"><span class="num">1</span>${t('step1_title')}</div>`;
        if(!s.hizmetler.length) h += `<div class="empty-state">${t('no_services')}</div>`;
        s.hizmetler.forEach(hi => {
          h += `<div class="card ${s.seciliHizmet?.id===hi.id?'selected':''}" onclick="secHizmet(${hi.id})">
            <div class="card-icon">${hi.emoji||'✂️'}</div>
            <div class="card-info">
              <h3>${hi.isim}</h3>
              <p>${hi.sure_dk} ${t('minutes')}</p>
            </div>
            ${hi.fiyat?`<div><div class="card-price">${hi.fiyat}₺</div></div>`:''}
          </div>`;
        });
        if(s.seciliHizmet) h += `<button class="btn-primary" onclick="hizmetSonrasi()">${t('continue')}</button>`;
      }

      // Step 2
      else if(s.step===2) {
        h += `<button class="btn-back" onclick="adim(1)">← ${t('back')}</button>`;
        h += `<div class="step-title"><span class="num">2</span>${t('step2_title')}</div>`;
        h += `<div class="card ${s.seciliCalisan===null&&s.calisanSecildi?'selected':''}" onclick="secCalisanFarketmez()">
          <div class="card-icon">🔄</div>
          <div class="card-info"><h3>${t('any_expert')}</h3><p>${t('any_expert_desc')}</p></div>
        </div>`;
        s.calisanlar.forEach(c => {
          h += `<div class="card ${s.seciliCalisan?.id===c.id?'selected':''}" onclick="secCalisan(${c.id})">
            <div class="card-icon">👤</div>
            <div class="card-info"><h3>${c.isim}</h3></div>
          </div>`;
        });
        if(s.calisanSecildi) h += `<button class="btn-primary" onclick="adim(3)">${t('continue')}</button>`;
      }

      // Step 3
      else if(s.step===3) {
        h += `<button class="btn-back" onclick="geriTarih()">← ${t('back')}</button>`;
        h += `<div class="step-title"><span class="num">3</span>${t('step3_title')}</div>`;
        const tarihler = yaklasTarihler();
        h += '<div class="date-scroll">';
        tarihler.forEach(tt => {
          h += `<div class="date-btn ${s.seciliTarih===tt.tarih?'selected':''}" onclick="secTarih('${tt.tarih}')">
            <div class="day-name">${tt.bugun?t('today'):tt.gun}</div>
            <div class="day-num">${tt.gunNum}</div>
            <div class="month">${tt.ay}</div>
          </div>`;
        });
        h += '</div>';
        if(s.seciliTarih) {
          if(s.yukleniyor) h += `<div class="loading"><div class="spinner"></div>${t('loading_hours')}</div>`;
          else if(!s.saatler.length) h += `<div class="empty-state">${t('no_hours')}</div>`;
          else {
            h += '<div class="time-grid">';
            s.saatler.forEach(sa => { h += `<div class="time-btn ${s.seciliSaat===sa?'selected':''}" onclick="secSaat('${sa}')">${sa}</div>`; });
            h += '</div>';
          }
        }
        if(s.seciliSaat) h += `<button class="btn-primary" onclick="adim(4)">${t('continue')}</button>`;
      }

      // Step 4
      else if(s.step===4) {
        h += `<button class="btn-back" onclick="adim(3)">← ${t('back')}</button>`;
        h += `<div class="step-title"><span class="num">4</span>${t('step4_title')}</div>`;
        h += `<div class="input-group"><label>${t('name_label')}</label>
          <input type="text" id="musteriAd" value="${s.musteriAd}" placeholder="${t('name_placeholder')}" oninput="state.musteriAd=this.value;bilgiKontrol()" maxlength="60"></div>`;
        h += `<div class="input-group"><label>${t('phone_label')}</label>
          <input type="tel" id="musteriTel" value="${s.musteriTel}" placeholder="${t('phone_placeholder')}" oninput="state.musteriTel=this.value;bilgiKontrol()" maxlength="15"></div>`;
        h += `<div style="position:absolute;left:-9999px"><input type="text" id="website" tabindex="-1" autocomplete="off"></div>`;
        h += `<div class="input-group"><label>${t('captcha_label')}: ${s.captchaA} + ${s.captchaB} = ?</label>
          <input type="number" id="captchaInput" placeholder="${t('captcha_placeholder')}" oninput="state.captchaCevap=this.value;bilgiKontrol()"></div>`;
        h += `<div class="input-group"><label>${t('note_label')}</label>
          <textarea id="musteriNot" placeholder="${t('note_placeholder')}" oninput="state.musteriNot=this.value">${s.musteriNot}</textarea></div>`;
        h += `<button class="btn-primary" id="btnOzet" onclick="bilgiDevam()">${t('view_summary')}</button>`;
      }

      // Step 5
      else if(s.step===5) {
        h += `<button class="btn-back" onclick="adim(4)">← ${t('back')}</button>`;
        h += `<div class="step-title"><span class="num">5</span>${t('step5_title')}</div>`;
        h += `<div class="summary">
          <div class="summary-row"><span>${t('service')}</span><span>${s.seciliHizmet?.isim}</span></div>
          ${s.seciliCalisan?`<div class="summary-row"><span>${t('expert')}</span><span>${s.seciliCalisan.isim}</span></div>`:''}
          <div class="summary-row"><span>${t('date')}</span><span>${formatTarih(s.seciliTarih)}</span></div>
          <div class="summary-row"><span>${t('time')}</span><span>${s.seciliSaat}</span></div>
          <div class="summary-row"><span>${t('duration')}</span><span>${s.seciliHizmet?.sure_dk} ${t('minutes')}</span></div>
          ${s.seciliHizmet?.fiyat?`<div class="summary-row"><span>${t('price')}</span><span>${s.seciliHizmet.fiyat}₺</span></div>`:''}
          <div class="summary-row"><span>${t('full_name')}</span><span>${s.musteriAd}</span></div>
          <div class="summary-row"><span>${t('phone')}</span><span>${s.musteriTel}</span></div>
          ${s.musteriNot?`<div class="summary-row"><span>${t('note')}</span><span>${s.musteriNot}</span></div>`:''}
        </div>`;
        h += `<button class="btn-primary" onclick="randevuOlustur()" ${s.yukleniyor?'disabled':''}>${s.yukleniyor?t('submitting'):t('confirm')}</button>`;
      }

      // Step 6
      else if(s.step===6) {
        h += `<div class="success-screen">
          <div class="success-icon">${svgCheck}</div>
          <h2>${t('success_title')}</h2>
          <p>
            <strong>${s.seciliHizmet?.isim}</strong> ${t('for_text')}<br>
            <strong>${formatTarih(s.seciliTarih)}</strong> ${t('at_date')} <strong>${s.seciliSaat}</strong><br>
            ${t('success_msg')}<br><br>
            ${t('success_notify')}
          </p>
          <button class="btn-primary" onclick="yeniRandevu()" style="margin-top:28px">${t('new_booking')}</button>
        </div>`;
      }

      h += `<div class="footer">Powered by <a href="https://xn--srago-n4a.com" target="_blank">SıraGO</a></div>`;
      app.innerHTML = h;
    }

    /* ─── actions ─── */
    async function init() {
      const data = await api(`/book/${slug}`);
      if(data.hata||!data.isletme) {
        document.getElementById('app').innerHTML = `<div style="text-align:center;padding:60px 0"><h2 style="margin-bottom:8px">${t('not_found_title')}</h2><p style="color:var(--muted)">${t('not_found_desc')}</p></div>`;
        return;
      }
      state.isletme = data.isletme;
      const hData = await api(`/book/${slug}/hizmetler`);
      state.hizmetler = hData.hizmetler || [];
      document.title = `${state.isletme.isim} - ${t('online_booking')}`;
      yeniCaptcha(); render();
    }

    async function secHizmet(id) {
      state.seciliHizmet = state.hizmetler.find(x=>x.id===id);
      state.hata = '';
      const cData = await api(`/book/${slug}/calisanlar?hizmetId=${id}`);
      state.calisanlar = cData.calisanlar||[];
      state.otomatikCalisan = cData.otomatik||false;
      state.calisanSecildi = false;
      render();
    }
    function secCalisan(id) { state.seciliCalisan = state.calisanlar.find(c=>c.id===id); state.calisanSecildi=true; state.hata=''; render(); }
    function secCalisanFarketmez() { state.seciliCalisan=null; state.calisanSecildi=true; state.hata=''; render(); }

    async function secTarih(tarih) {
      state.seciliTarih=tarih; state.seciliSaat=null; state.saatler=[]; state.yukleniyor=true; state.hata=''; render();
      const params = `?tarih=${tarih}&hizmetId=${state.seciliHizmet.id}${state.seciliCalisan?'&calisanId='+state.seciliCalisan.id:''}`;
      const data = await api(`/book/${slug}/saatler${params}`);
      state.saatler = data.saatler||[]; state.yukleniyor=false; render();
    }
    function secSaat(s) { state.seciliSaat=s; state.hata=''; render(); }

    function adim(step) { state.step=step; state.hata=''; render(); window.scrollTo(0,0); }
    function geriTarih() { state.otomatikCalisan||state.calisanlar.length<=1 ? adim(1) : adim(2); }

    function hizmetSonrasi() {
      if(state.otomatikCalisan||state.calisanlar.length===0) { state.seciliCalisan=null; adim(3); }
      else if(state.calisanlar.length===1) { state.seciliCalisan=state.calisanlar[0]; adim(3); }
      else adim(2);
    }

    function bilgiKontrol() {
      const btn = document.getElementById('btnOzet');
      if(btn) btn.disabled = !(state.musteriAd.trim()&&state.musteriTel.trim()&&state.captchaCevap);
    }
    function bilgiDevam() {
      const hp = document.getElementById('website');
      if(hp&&hp.value) { state.hata=t('err_invalid'); render(); return; }
      if(!state.musteriAd.trim()||!state.musteriTel.trim()) { state.hata=t('err_name_phone'); render(); return; }
      const tel = state.musteriTel.replace(/\s/g,'');
      if(!/^(05\d{9}|5\d{9}|905\d{9}|\+905\d{9})$/.test(tel)) { state.hata=t('err_phone_format'); render(); return; }
      if(parseInt(state.captchaCevap)!==state.captchaA+state.captchaB) { state.hata=t('err_captcha'); yeniCaptcha(); render(); return; }
      if(state.sonRandevuZaman&&Date.now()-state.sonRandevuZaman<60000) { state.hata=t('err_cooldown'); render(); return; }
      adim(5);
    }
    function yeniCaptcha() { state.captchaA=Math.floor(Math.random()*9)+1; state.captchaB=Math.floor(Math.random()*9)+1; state.captchaCevap=''; }

    async function randevuOlustur() {
      state.yukleniyor=true; state.hata=''; render();
      const tel = state.musteriTel.replace(/\s/g,'').replace(/^0/,'90');
      const body = {musteriTelefon:tel, musteriIsim:state.musteriAd, hizmetId:state.seciliHizmet.id, calisanId:state.seciliCalisan?.id||null, tarih:state.seciliTarih, saat:state.seciliSaat};
      const data = await apiPost(`/book/${slug}/randevu`, body);
      state.yukleniyor=false;
      if(data.hata) { state.hata=data.hata; render(); return; }
      state.sonRandevuZaman=Date.now(); state.step=6; render();
    }

    function yeniRandevu() {
      Object.assign(state, {step:1,seciliHizmet:null,seciliCalisan:null,seciliTarih:null,seciliSaat:null,saatler:[],musteriAd:'',musteriTel:'',musteriNot:'',hata:'',calisanSecildi:false});
      yeniCaptcha(); render();
    }

    init();
  </script>
</body>
</html>
