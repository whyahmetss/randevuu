<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Randevu Al</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--primary:#6366f1;--primary-light:#eef2ff;--green:#10b981;--red:#ef4444;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .booking-container{max-width:480px;margin:0 auto;padding:24px 16px 80px}
    .brand-bar{text-align:center;padding:16px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .brand-bar h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
    .brand-bar p{font-size:13px;color:var(--muted);margin-top:4px}
    .brand-bar .badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;background:var(--primary-light);color:var(--primary);margin-top:8px}

    .step-indicator{display:flex;gap:6px;margin-bottom:24px}
    .step-dot{flex:1;height:4px;border-radius:99px;background:var(--border);transition:background .3s}
    .step-dot.active{background:var(--primary)}
    .step-dot.done{background:var(--green)}

    .step-title{font-size:17px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .step-title .num{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
    .card:hover{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
    .card.selected{border-color:var(--primary);background:var(--primary-light);box-shadow:0 0 0 2px rgba(99,102,241,.2)}
    .card-icon{width:40px;height:40px;border-radius:10px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .card-info h3{font-size:14px;font-weight:600}
    .card-info p{font-size:12px;color:var(--muted);margin-top:2px}
    .card-price{margin-left:auto;font-size:14px;font-weight:700;color:var(--primary);white-space:nowrap}

    .time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .time-btn{padding:10px 4px;border:1px solid var(--border);border-radius:10px;background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
    .time-btn:hover{border-color:var(--primary);background:var(--primary-light)}
    .time-btn.selected{background:var(--primary);color:#fff;border-color:var(--primary)}

    .date-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
    .date-scroll::-webkit-scrollbar{display:none}
    .date-btn{min-width:64px;padding:10px 8px;border:1px solid var(--border);border-radius:12px;background:var(--surface);cursor:pointer;text-align:center;transition:all .2s;flex-shrink:0}
    .date-btn:hover{border-color:var(--primary)}
    .date-btn.selected{background:var(--primary);color:#fff;border-color:var(--primary)}
    .date-btn .day-name{font-size:11px;font-weight:500;opacity:.7}
    .date-btn .day-num{font-size:18px;font-weight:700;margin:2px 0}
    .date-btn .month{font-size:10px;font-weight:500;opacity:.7}

    .input-group{margin-bottom:14px}
    .input-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
    .input-group input,.input-group textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border .2s}
    .input-group input:focus,.input-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
    .input-group textarea{resize:vertical;min-height:60px}

    .btn-primary{width:100%;padding:14px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;margin-top:8px}
    .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-back{background:none;border:1px solid var(--border);color:var(--text);padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;gap:6px;font-family:inherit}

    .summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
    .summary-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid #f1f5f9}
    .summary-row:last-child{border:none}
    .summary-row span:first-child{color:var(--muted)}
    .summary-row span:last-child{font-weight:600}

    .success-screen{text-align:center;padding:40px 0}
    .success-icon{width:72px;height:72px;border-radius:50%;background:rgba(16,185,129,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px}
    .success-screen h2{font-size:22px;font-weight:800;margin-bottom:8px}
    .success-screen p{font-size:14px;color:var(--muted);line-height:1.6}

    .loading{text-align:center;padding:60px 0;color:var(--muted);font-size:14px}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}

    .error-msg{background:#fef2f2;border:1px solid #fecaca;color:var(--red);padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;font-weight:500}

    @media(max-width:400px){.time-grid{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
  <div class="booking-container" id="app">
    <div class="loading"><div class="spinner"></div>Yükleniyor...</div>
  </div>

  <script>
    const API = '/api';
    const slug = window.location.pathname.split('/book/')[1];
    
    let state = {
      step: 1,
      isletme: null,
      hizmetler: [],
      calisanlar: [],
      saatler: [],
      seciliHizmet: null,
      seciliCalisan: null,
      seciliTarih: null,
      seciliSaat: null,
      musteriAd: '',
      musteriTel: '',
      musteriNot: '',
      hata: '',
      yukleniyor: false,
      captchaA: 0,
      captchaB: 0,
      captchaCevap: '',
      sonRandevuZaman: 0
    };

    const gunAdlari = ['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
    const ayAdlari = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];

    async function api(endpoint) {
      try {
        const r = await fetch(API + endpoint);
        return await r.json();
      } catch(e) { return { hata: 'Bağlantı hatası' }; }
    }
    async function apiPost(endpoint, body) {
      try {
        const r = await fetch(API + endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        return await r.json();
      } catch(e) { return { hata: 'Bağlantı hatası' }; }
    }

    function yaklasTarihler() {
      const tarihler = [];
      const bugun = new Date();
      for(let i=0; i<14; i++) {
        const d = new Date(bugun);
        d.setDate(bugun.getDate() + i);
        tarihler.push({
          tarih: d.toISOString().slice(0,10),
          gun: gunAdlari[d.getDay()],
          gunNum: d.getDate(),
          ay: ayAdlari[d.getMonth()],
          bugun: i===0
        });
      }
      return tarihler;
    }

    function render() {
      const app = document.getElementById('app');
      const s = state;

      if(!s.isletme) {
        app.innerHTML = '<div class="loading"><div class="spinner"></div>Yükleniyor...</div>';
        return;
      }

      let html = '';
      
      // Brand bar
      html += `<div class="brand-bar">
        <h1>${s.isletme.isim || 'Online Randevu'}</h1>
        ${s.isletme.adres ? `<p>${s.isletme.adres}</p>` : ''}
        <div class="badge">Online Randevu</div>
      </div>`;

      // Steps
      html += '<div class="step-indicator">';
      for(let i=1; i<=5; i++) {
        html += `<div class="step-dot ${s.step > i ? 'done' : ''} ${s.step === i ? 'active' : ''}"></div>`;
      }
      html += '</div>';

      if(s.hata) html += `<div class="error-msg">${s.hata}</div>`;

      // Step 1: Hizmet seç
      if(s.step === 1) {
        html += '<div class="step-title"><span class="num">1</span>Hizmet Seçin</div>';
        if(!s.hizmetler.length) {
          html += '<p style="color:var(--muted);text-align:center;padding:20px 0">Henüz hizmet tanımlanmamış.</p>';
        }
        s.hizmetler.forEach(h => {
          html += `<div class="card ${s.seciliHizmet?.id===h.id?'selected':''}" onclick="secHizmet(${h.id})">
            <div class="card-icon">${h.emoji||'💇'}</div>
            <div class="card-info">
              <h3>${h.isim}</h3>
              <p>${h.sure_dk} dk</p>
            </div>
            <div class="card-price">${h.fiyat ? h.fiyat+'₺' : ''}</div>
          </div>`;
        });
        if(s.seciliHizmet) html += `<button class="btn-primary" onclick="hizmetSonrasi()">Devam Et</button>`;
      }

      // Step 2: Çalışan seç
      else if(s.step === 2) {
        html += `<button class="btn-back" onclick="adim(1)">← Geri</button>`;
        html += '<div class="step-title"><span class="num">2</span>Uzman Seçin</div>';
        // Farketmez seçeneği
        html += `<div class="card ${s.seciliCalisan===null&&s.calisanSecildi?'selected':''}" onclick="secCalisanFarketmez()">
          <div class="card-icon">🔄</div>
          <div class="card-info">
            <h3>Farketmez</h3>
            <p>Uygun olan uzmana ata</p>
          </div>
        </div>`;
        s.calisanlar.forEach(c => {
          html += `<div class="card ${s.seciliCalisan?.id===c.id?'selected':''}" onclick="secCalisan(${c.id})">
            <div class="card-icon">👤</div>
            <div class="card-info">
              <h3>${c.isim}</h3>
              ${c.uzmanlik ? `<p>${c.uzmanlik}</p>` : ''}
            </div>
          </div>`;
        });
        if(s.seciliCalisan !== undefined && s.calisanSecildi) html += `<button class="btn-primary" onclick="adim(3)">Devam Et</button>`;
      }

      // Step 3: Tarih ve saat
      else if(s.step === 3) {
        html += `<button class="btn-back" onclick="adim(2)">← Geri</button>`;
        html += '<div class="step-title"><span class="num">3</span>Tarih & Saat</div>';
        
        const tarihler = yaklasTarihler();
        html += '<div class="date-scroll">';
        tarihler.forEach(t => {
          html += `<div class="date-btn ${s.seciliTarih===t.tarih?'selected':''}" onclick="secTarih('${t.tarih}')">
            <div class="day-name">${t.bugun?'Bugün':t.gun}</div>
            <div class="day-num">${t.gunNum}</div>
            <div class="month">${t.ay}</div>
          </div>`;
        });
        html += '</div>';

        if(s.seciliTarih) {
          if(s.yukleniyor) {
            html += '<div class="loading"><div class="spinner"></div>Saatler yükleniyor...</div>';
          } else if(!s.saatler.length) {
            html += '<p style="color:var(--muted);text-align:center;padding:20px 0">Bu tarihte müsait saat bulunmuyor.</p>';
          } else {
            html += '<div class="time-grid">';
            s.saatler.forEach(saat => {
              html += `<div class="time-btn ${s.seciliSaat===saat?'selected':''}" onclick="secSaat('${saat}')">${saat}</div>`;
            });
            html += '</div>';
          }
        }
        if(s.seciliSaat) html += `<button class="btn-primary" onclick="adim(4)">Devam Et</button>`;
      }

      // Step 4: Kişisel bilgiler
      else if(s.step === 4) {
        html += `<button class="btn-back" onclick="adim(3)">← Geri</button>`;
        html += '<div class="step-title"><span class="num">4</span>Bilgileriniz</div>';
        html += `<div class="input-group">
          <label>Adınız Soyadınız</label>
          <input type="text" id="musteriAd" value="${s.musteriAd}" placeholder="Örn: Ahmet Yılmaz" oninput="state.musteriAd=this.value;bilgiKontrol()" maxlength="60">
        </div>
        <div class="input-group">
          <label>Telefon Numaranız</label>
          <input type="tel" id="musteriTel" value="${s.musteriTel}" placeholder="05XX XXX XX XX" oninput="state.musteriTel=this.value;bilgiKontrol()" maxlength="15">
        </div>
        <div style="position:absolute;left:-9999px"><input type="text" id="website" tabindex="-1" autocomplete="off"></div>
        <div class="input-group">
          <label>Doğrulama: ${s.captchaA} + ${s.captchaB} = ?</label>
          <input type="number" id="captchaInput" placeholder="Sonucu yazın" oninput="state.captchaCevap=this.value;bilgiKontrol()">
        </div>
        <div class="input-group">
          <label>Not (opsiyonel)</label>
          <textarea id="musteriNot" placeholder="Özel bir isteğiniz varsa yazabilirsiniz" oninput="state.musteriNot=this.value">${s.musteriNot}</textarea>
        </div>`;
        html += `<button class="btn-primary" id="btnOzet" onclick="bilgiDevam()">Özeti Gör</button>`;
      }

      // Step 5: Onay
      else if(s.step === 5) {
        html += `<button class="btn-back" onclick="adim(4)">← Geri</button>`;
        html += '<div class="step-title"><span class="num">5</span>Randevu Özeti</div>';
        html += `<div class="summary">
          <div class="summary-row"><span>Hizmet</span><span>${s.seciliHizmet?.isim}</span></div>
          ${s.seciliCalisan ? `<div class="summary-row"><span>Uzman</span><span>${s.seciliCalisan.isim}</span></div>` : ''}
          <div class="summary-row"><span>Tarih</span><span>${formatTarih(s.seciliTarih)}</span></div>
          <div class="summary-row"><span>Saat</span><span>${s.seciliSaat}</span></div>
          <div class="summary-row"><span>Süre</span><span>${s.seciliHizmet?.sure_dk} dakika</span></div>
          ${s.seciliHizmet?.fiyat ? `<div class="summary-row"><span>Ücret</span><span>${s.seciliHizmet.fiyat}₺</span></div>` : ''}
          <div class="summary-row"><span>Ad Soyad</span><span>${s.musteriAd}</span></div>
          <div class="summary-row"><span>Telefon</span><span>${s.musteriTel}</span></div>
          ${s.musteriNot ? `<div class="summary-row"><span>Not</span><span>${s.musteriNot}</span></div>` : ''}
        </div>`;
        html += `<button class="btn-primary" onclick="randevuOlustur()" ${s.yukleniyor?'disabled':''}>${s.yukleniyor?'Gönderiliyor...':'Randevuyu Onayla'}</button>`;
      }

      // Step 6: Başarılı
      else if(s.step === 6) {
        html += `<div class="success-screen">
          <div class="success-icon">✅</div>
          <h2>Randevunuz Oluşturuldu!</h2>
          <p>
            <strong>${s.seciliHizmet?.isim}</strong> için<br>
            <strong>${formatTarih(s.seciliTarih)}</strong> tarihinde saat <strong>${s.seciliSaat}</strong>'de<br>
            randevunuz başarıyla oluşturuldu.<br><br>
            Onay mesajınız kısa süre içinde gönderilecektir.
          </p>
          <button class="btn-primary" onclick="yeniRandevu()" style="margin-top:24px">Yeni Randevu Al</button>
        </div>`;
      }

      // Footer
      html += `<div style="text-align:center;padding:32px 0 16px;font-size:11px;color:var(--muted)">
        Powered by <a href="https://sirago.com" style="color:var(--primary);font-weight:600">SıraGO</a>
      </div>`;

      app.innerHTML = html;
    }

    function formatTarih(tarihStr) {
      if(!tarihStr) return '';
      const d = new Date(tarihStr + 'T00:00:00');
      return `${d.getDate()} ${ayAdlari[d.getMonth()]} ${d.getFullYear()}, ${gunAdlari[d.getDay()]}`;
    }

    async function init() {
      const data = await api(`/book/${slug}`);
      if(data.hata || !data.isletme) {
        document.getElementById('app').innerHTML = `<div style="text-align:center;padding:60px 0"><h2 style="margin-bottom:8px">İşletme Bulunamadı</h2><p style="color:var(--muted)">Bu adres aktif değil veya yanlış bir bağlantı.</p></div>`;
        return;
      }
      state.isletme = data.isletme;
      
      const hData = await api(`/book/${slug}/hizmetler`);
      state.hizmetler = hData.hizmetler || [];
      
      document.title = `${state.isletme.isim} - Online Randevu`;
      yeniCaptcha();
      render();
    }

    async function secHizmet(id) {
      state.seciliHizmet = state.hizmetler.find(h => h.id === id);
      state.hata = '';
      // Çalışanları hizmet seçildikten sonra yükle
      const cData = await api(`/book/${slug}/calisanlar?hizmetId=${id}`);
      state.calisanlar = cData.calisanlar || [];
      state.otomatikCalisan = cData.otomatik || false;
      render();
    }
    function secCalisan(id) {
      state.seciliCalisan = state.calisanlar.find(c => c.id === id);
      state.calisanSecildi = true;
      state.hata = '';
      render();
    }
    function secCalisanFarketmez() {
      state.seciliCalisan = null;
      state.calisanSecildi = true;
      state.hata = '';
      render();
    }
    async function secTarih(tarih) {
      state.seciliTarih = tarih;
      state.seciliSaat = null;
      state.saatler = [];
      state.yukleniyor = true;
      state.hata = '';
      render();
      
      const params = `?tarih=${tarih}&hizmetId=${state.seciliHizmet.id}${state.seciliCalisan ? '&calisanId='+state.seciliCalisan.id : ''}`;
      const data = await api(`/book/${slug}/saatler${params}`);
      state.saatler = data.saatler || [];
      state.yukleniyor = false;
      render();
    }
    function secSaat(saat) {
      state.seciliSaat = saat;
      state.hata = '';
      render();
    }

    function bilgiKontrol() {
      const btn = document.getElementById('btnOzet');
      if(btn) btn.disabled = !(state.musteriAd.trim() && state.musteriTel.trim() && state.captchaCevap);
    }
    function bilgiDevam() {
      // Honeypot kontrolü
      const hp = document.getElementById('website');
      if(hp && hp.value) { state.hata = 'Geçersiz istek.'; render(); return; }
      
      if(!state.musteriAd.trim() || !state.musteriTel.trim()) {
        state.hata = 'Lütfen ad ve telefon bilgilerinizi girin.';
        render(); return;
      }
      // Telefon format kontrolü
      const tel = state.musteriTel.replace(/\s/g,'');
      if(!/^(05\d{9}|5\d{9}|905\d{9}|\+905\d{9})$/.test(tel)) {
        state.hata = 'Geçerli bir Türkiye telefon numarası girin (05XX XXX XX XX).';
        render(); return;
      }
      // Captcha kontrolü
      if(parseInt(state.captchaCevap) !== state.captchaA + state.captchaB) {
        state.hata = 'Doğrulama sonucu yanlış. Lütfen tekrar deneyin.';
        yeniCaptcha();
        render(); return;
      }
      // Cooldown kontrolü
      const simdi = Date.now();
      if(state.sonRandevuZaman && simdi - state.sonRandevuZaman < 60000) {
        state.hata = 'Çok hızlı istek gönderiyorsunuz. Lütfen 1 dakika bekleyin.';
        render(); return;
      }
      adim(5);
    }
    function yeniCaptcha() {
      state.captchaA = Math.floor(Math.random()*9)+1;
      state.captchaB = Math.floor(Math.random()*9)+1;
      state.captchaCevap = '';
    }

    function adim(step) {
      state.step = step;
      state.hata = '';
      render();
      window.scrollTo(0, 0);
    }

    function hizmetSonrasi() {
      // Çalışan otomatik seçim modundaysa veya tek çalışan varsa 3. adıma atla
      if(state.otomatikCalisan || state.calisanlar.length === 0) {
        state.seciliCalisan = null;
        adim(3);
      } else if(state.calisanlar.length === 1) {
        state.seciliCalisan = state.calisanlar[0];
        adim(3);
      } else {
        adim(2);
      }
    }

    async function randevuOlustur() {
      state.yukleniyor = true;
      state.hata = '';
      render();

      const tel = state.musteriTel.replace(/\s/g,'').replace(/^0/,'90');
      const body = {
        musteriTelefon: tel,
        musteriIsim: state.musteriAd,
        hizmetId: state.seciliHizmet.id,
        calisanId: state.seciliCalisan?.id || null,
        tarih: state.seciliTarih,
        saat: state.seciliSaat
      };

      const data = await apiPost(`/book/${slug}/randevu`, body);
      state.yukleniyor = false;

      if(data.hata) {
        state.hata = data.hata;
        render();
        return;
      }
      
      state.sonRandevuZaman = Date.now();
      state.step = 6;
      render();
    }

    function yeniRandevu() {
      state.step = 1;
      state.seciliHizmet = null;
      state.seciliCalisan = null;
      state.seciliTarih = null;
      state.seciliSaat = null;
      state.saatler = [];
      state.musteriAd = '';
      state.musteriTel = '';
      state.musteriNot = '';
      state.hata = '';
      yeniCaptcha();
      render();
    }

    init();
  </script>
</body>
</html>
