<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Randevu Al</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0f0f12;--bg2:#16161d;--surface:rgba(255,255,255,.05);--surface2:rgba(255,255,255,.08);--surface3:rgba(255,255,255,.03);
      --border:rgba(255,255,255,.08);--border-active:rgba(139,92,246,.5);
      --text:#f0f0f5;--text2:#c0c0cc;--muted:#6b6b80;
      --primary:#8b5cf6;--primary2:#a78bfa;--primary-dark:#7c3aed;--primary-glow:rgba(139,92,246,.2);--primary-glow2:rgba(139,92,246,.08);
      --accent:#06b6d4;--accent-glow:rgba(6,182,212,.15);
      --green:#34d399;--green-glow:rgba(52,211,153,.15);
      --red:#f87171;--red-bg:rgba(248,113,113,.1);
      --radius:20px;--radius-sm:14px;--radius-xs:10px;
      --glass:saturate(180%) blur(20px)
    }
    body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#f0f2f5;color:var(--text);min-height:100vh;overflow-x:hidden;
      background-image:radial-gradient(ellipse at 20% 0%,rgba(139,92,246,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(6,182,212,.04) 0%,transparent 50%)}

    [dir="rtl"]{direction:rtl;text-align:right}
    [dir="rtl"] .card-row{flex-direction:row-reverse}
    [dir="rtl"] .card-price{margin-left:0;margin-right:auto}
    [dir="rtl"] .step-header{flex-direction:row-reverse}
    [dir="rtl"] .summary-row{flex-direction:row-reverse}
    [dir="rtl"] .btn-back svg{transform:scaleX(-1)}
    [dir="rtl"] .date-scroll{direction:rtl}
    [dir="rtl"] .lang-select{left:0;right:auto}

    .wrap{max-width:480px;margin:0 auto;padding:16px 16px 40px;position:relative}

    /* Glass card main container */
    .glass{background:rgba(22,22,29,.7);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:28px;padding:28px 24px 32px;box-shadow:0 8px 40px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04)}

    .lang-select{display:flex;gap:4px;justify-content:flex-end;margin-bottom:20px;position:relative}
    .lang-btn{width:38px;height:30px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--surface);cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);transition:all .3s;display:flex;align-items:center;justify-content:center;font-family:inherit;letter-spacing:.5px}
    .lang-btn:hover{border-color:var(--primary);color:var(--primary2)}
    .lang-btn.active{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-color:transparent;box-shadow:0 2px 12px var(--primary-glow)}

    .brand{text-align:center;margin-bottom:28px}
    .brand-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px;font-weight:900;color:#fff;box-shadow:0 4px 20px var(--primary-glow);text-transform:uppercase}
    .brand h1{font-size:22px;font-weight:800;letter-spacing:-.3px;background:linear-gradient(135deg,var(--text),var(--text2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
    .brand .sub{font-size:12px;color:var(--muted);margin-top:3px;font-weight:400}
    .brand .tag{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:5px 14px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;background:var(--primary-glow2);color:var(--primary2);border:1px solid rgba(139,92,246,.15)}
    .brand .tag svg{width:11px;height:11px}

    .progress{display:flex;gap:5px;margin-bottom:28px}
    .prog-dot{flex:1;height:3px;border-radius:99px;background:var(--surface2);transition:all .5s ease;position:relative;overflow:hidden}
    .prog-dot.active{background:transparent}
    .prog-dot.active::after{content:'';position:absolute;inset:0;border-radius:99px;background:linear-gradient(90deg,var(--primary),var(--accent));animation:shimmer 2s ease infinite}
    .prog-dot.done{background:var(--green)}
    @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.6}}

    .step-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
    .step-num{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;box-shadow:0 2px 12px var(--primary-glow);flex-shrink:0}
    .step-label{font-size:15px;font-weight:700;color:var(--text)}

    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .3s ease}
    .card:hover{border-color:var(--border-active);background:var(--surface2);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.2)}
    .card.selected{border-color:var(--primary);background:var(--primary-glow2);box-shadow:0 0 0 1px var(--primary),0 4px 20px var(--primary-glow)}
    .card-row{display:flex;align-items:center;gap:14px}
    .card-icon{width:42px;height:42px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all .3s}
    .card.selected .card-icon{background:var(--primary-glow);box-shadow:0 0 12px var(--primary-glow)}
    .card-body{flex:1;min-width:0}
    .card-body h3{font-size:14px;font-weight:600;color:var(--text)}
    .card-body p{font-size:11px;color:var(--muted);margin-top:2px}
    .card-price{font-size:14px;font-weight:800;color:var(--primary2);white-space:nowrap}

    .time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}
    .time-btn{padding:11px 4px;border:1px solid var(--border);border-radius:var(--radius-xs);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .25s;font-family:inherit;color:var(--text2)}
    .time-btn:hover{border-color:var(--border-active);background:var(--surface2);transform:translateY(-1px)}
    .time-btn.selected{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-color:transparent;box-shadow:0 2px 12px var(--primary-glow)}

    .date-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
    .date-scroll::-webkit-scrollbar{display:none}
    .date-btn{min-width:62px;padding:10px 6px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;text-align:center;transition:all .25s;flex-shrink:0}
    .date-btn:hover{border-color:var(--border-active);transform:translateY(-1px)}
    .date-btn.selected{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-color:transparent;box-shadow:0 2px 16px var(--primary-glow)}
    .date-btn .dn{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.6}
    .date-btn .dnum{font-size:19px;font-weight:900;margin:2px 0}
    .date-btn .dm{font-size:9px;font-weight:500;opacity:.5}

    .fg{margin-bottom:14px}
    .fg label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase}
    .fg input,.fg textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-xs);font-size:14px;font-family:inherit;outline:none;transition:all .3s;background:var(--surface);color:var(--text)}
    .fg input:focus,.fg textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
    .fg input::placeholder,.fg textarea::placeholder{color:var(--muted)}
    .fg textarea{resize:vertical;min-height:56px}

    .btn-go{width:100%;padding:15px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--primary),#6d28d9);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .3s;margin-top:16px;box-shadow:0 4px 20px var(--primary-glow);letter-spacing:.3px;position:relative;overflow:hidden}
    .btn-go::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);transition:left .5s}
    .btn-go:hover::before{left:100%}
    .btn-go:hover{transform:translateY(-2px);box-shadow:0 6px 28px var(--primary-glow)}
    .btn-go:active{transform:translateY(0)}
    .btn-go:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

    .btn-back{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:var(--radius-xs);font-size:12px;font-weight:600;cursor:pointer;margin-bottom:16px;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:all .2s}
    .btn-back:hover{border-color:var(--primary);color:var(--primary2)}
    .btn-back svg{width:14px;height:14px}

    .summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px 20px;margin-bottom:16px}
    .summary-row{display:flex;justify-content:space-between;padding:9px 0;font-size:12px;border-bottom:1px solid var(--surface2)}
    .summary-row:last-child{border:none}
    .summary-row span:first-child{color:var(--muted);font-weight:500}
    .summary-row span:last-child{font-weight:600;color:var(--text)}

    .success{text-align:center;padding:40px 0}
    .success-ring{width:72px;height:72px;border-radius:50%;background:var(--green-glow);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:popIn .4s ease}
    .success-ring svg{width:36px;height:36px;color:var(--green)}
    @keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
    .success h2{font-size:20px;font-weight:800;margin-bottom:6px}
    .success p{font-size:13px;color:var(--muted);line-height:1.7}

    .loading{text-align:center;padding:60px 0;color:var(--muted);font-size:13px;font-weight:500}
    .spin{width:32px;height:32px;border:3px solid var(--surface2);border-top-color:var(--primary);border-radius:50%;animation:sp .6s linear infinite;margin:0 auto 12px}
    @keyframes sp{to{transform:rotate(360deg)}}

    .err{background:var(--red-bg);border:1px solid rgba(248,113,113,.2);color:var(--red);padding:12px 16px;border-radius:var(--radius-xs);font-size:12px;margin-bottom:16px;font-weight:500;display:flex;align-items:center;gap:8px}

    .footer{text-align:center;padding:28px 0 8px;opacity:.35;font-size:10px;font-weight:500;letter-spacing:.5px;transition:opacity .3s}
    .footer:hover{opacity:.6}
    .footer a{color:var(--primary2);text-decoration:none;font-weight:700}

    .empty{text-align:center;padding:28px 0;color:var(--muted);font-size:12px}

    @media(max-width:400px){
      .time-grid{grid-template-columns:repeat(3,1fr)}
      .wrap{padding:12px 10px 32px}
      .glass{padding:20px 16px 24px;border-radius:22px}
    }
  </style>
</head>

    };

    let lang = localStorage.getItem('booking_lang') || 'tr';
    function t(key) { return (T[lang] && T[lang][key]) || T.tr[key] || key; }
    function setLang(l) {
      lang = l;
      localStorage.setItem('booking_lang', l);
      document.documentElement.lang = l;
      document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
      render();
    }

    let state = {
      step: 1, isletme: null, hizmetler: [], calisanlar: [], saatler: [],
      seciliHizmet: null, seciliCalisan: null, seciliTarih: null, seciliSaat: null,
      musteriAd: '', musteriTel: '', musteriNot: '', hata: '', yukleniyor: false,
      captchaA: 0, captchaB: 0, captchaCevap: '', sonRandevuZaman: 0,
      otomatikCalisan: false, calisanSecildi: false
    };

    async function api(endpoint) {
      try { const r = await fetch(API + endpoint, {cache:'no-store'}); return await r.json(); }
      catch(e) { return {hata:'Connection error'}; }
    }
    async function apiPost(endpoint, body) {
      try {
        const r = await fetch(API + endpoint, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),cache:'no-store'});
        const text = await r.text();
        let data; try { data = JSON.parse(text); } catch(pe) { return {hata: text.substring(0,120)}; }
        if(!r.ok && !data.hata) data.hata = 'Error (' + r.status + ')';
        return data;
      } catch(e) { return {hata: e.message}; }
    }

    function yaklasTarihler() {
      const arr = [], bugun = new Date();
      for(let i=0;i<14;i++){
        const d = new Date(bugun); d.setDate(bugun.getDate()+i);
        arr.push({tarih:d.toISOString().slice(0,10), gun:t('days')[d.getDay()], gunNum:d.getDate(), ay:t('months')[d.getMonth()], bugun:i===0});
      }
      return arr;
    }

    function formatTarih(str) {
      if(!str) return '';
      const d = new Date(str+'T00:00:00');
      return `${d.getDate()} ${t('months')[d.getMonth()]} ${d.getFullYear()}, ${t('days')[d.getDay()]}`;
    }

    /* ─── Hizmet adı çevirisi (yaygın kuaför/berber hizmetleri) ─── */
    const hizmetCeviri = {
      en: {'saç kesimi':'Haircut','sakal traşı':'Beard Trim','çocuk traşı':'Kids Cut','damat traşı':'Groom Package','saç boyama':'Hair Color','fön':'Blow Dry','keratin':'Keratin','manikür':'Manicure','pedikür':'Pedicure','cilt bakımı':'Skin Care','ağda':'Waxing','masaj':'Massage','kaş aldırma':'Eyebrow','kirpik':'Eyelash','saç yıkama':'Hair Wash','saç bakımı':'Hair Care','perma':'Perm','röfle':'Highlights','boya':'Color','tıraş':'Shave'},
      ar: {'saç kesimi':'قص شعر','sakal traşı':'تشذيب اللحية','çocuk traşı':'قص أطفال','damat traşı':'باقة العريس','saç boyama':'صبغ شعر','fön':'تجفيف','keratin':'كيراتين','manikür':'مانيكير','pedikür':'باديكير','cilt bakımı':'عناية بالبشرة','ağda':'إزالة شعر','masaj':'مساج','kaş aldırma':'تشكيل حواجب','kirpik':'رموش','saç yıkama':'غسيل شعر','saç bakımı':'عناية بالشعر','perma':'برماننت','röfle':'هايلايت','boya':'صبغ','tıraş':'حلاقة'}
    };
    function hizmetAdi(isim) {
      if(lang==='tr') return isim;
      const map = hizmetCeviri[lang];
      if(!map) return isim;
      const key = isim.toLowerCase().trim();
      if(map[key]) return map[key];
      for(const [k,v] of Object.entries(map)) { if(key.includes(k)) return v; }
      return isim;
    }

    function render() {
      const app = document.getElementById('app');
      const s = state;
      if(!s.isletme) { app.innerHTML = `<div class="loading"><div class="spin"></div></div>`; return; }

      let h = '';

      // Language selector
      h += `<div class="lang-select">
        <button class="lang-btn ${lang==='tr'?'active':''}" onclick="setLang('tr')">TR</button>
        <button class="lang-btn ${lang==='en'?'active':''}" onclick="setLang('en')">EN</button>
        <button class="lang-btn ${lang==='ar'?'active':''}" onclick="setLang('ar')">AR</button>
      </div>`;

      // Brand
      const initials = (s.isletme.isim||'?').split(' ').map(w=>w[0]).join('').substring(0,2);
      h += `<div class="brand">
        <div class="brand-avatar">${initials}</div>
        <h1>${s.isletme.isim||t('online_booking')}</h1>
        ${s.isletme.adres?`<div class="sub">${s.isletme.adres}${s.isletme.ilce?' · '+s.isletme.ilce:''}</div>`:''}
        <div class="tag">${svgCal} ${t('online_booking')}</div>
      </div>`;

      // Progress
      h += '<div class="progress">';
      for(let i=1;i<=5;i++) h += `<div class="prog-dot ${s.step>i?'done':''} ${s.step===i?'active':''}"></div>`;
      h += '</div>';

      if(s.hata) h += `<div class="err">⚠ ${s.hata}</div>`;

      // Step 1 — Hizmet
      if(s.step===1) {
        h += `<div class="step-header"><span class="step-num">1</span><span class="step-label">${t('step1_title')}</span></div>`;
        if(!s.hizmetler.length) h += `<div class="empty">${t('no_services')}</div>`;
        s.hizmetler.forEach(hi => {
          h += `<div class="card ${s.seciliHizmet?.id===hi.id?'selected':''}" onclick="secHizmet(${hi.id})">
            <div class="card-row">
              <div class="card-icon">${hi.emoji||'✂️'}</div>
              <div class="card-body">
                <h3>${hizmetAdi(hi.isim)}</h3>
                <p>${hi.sure_dk} ${t('minutes')}</p>
              </div>
              ${hi.fiyat?`<div class="card-price">${hi.fiyat}₺</div>`:''}
            </div>
          </div>`;
        });
        if(s.seciliHizmet) h += `<button class="btn-go" onclick="hizmetSonrasi()">${t('continue')}</button>`;
      }

      // Step 2 — Çalışan
      else if(s.step===2) {
        h += `<button class="btn-back" onclick="adim(1)">${svgBack} ${t('back')}</button>`;
        h += `<div class="step-header"><span class="step-num">2</span><span class="step-label">${t('step2_title')}</span></div>`;
        h += `<div class="card ${s.seciliCalisan===null&&s.calisanSecildi?'selected':''}" onclick="secCalisanFarketmez()">
          <div class="card-row"><div class="card-icon">🔄</div><div class="card-body"><h3>${t('any_expert')}</h3><p>${t('any_expert_desc')}</p></div></div>
        </div>`;
        s.calisanlar.forEach(c => {
          h += `<div class="card ${s.seciliCalisan?.id===c.id?'selected':''}" onclick="secCalisan(${c.id})">
            <div class="card-row"><div class="card-icon">👤</div><div class="card-body"><h3>${c.isim}</h3></div></div>
          </div>`;
        });
        if(s.calisanSecildi) h += `<button class="btn-go" onclick="adim(3)">${t('continue')}</button>`;
      }

      // Step 3 — Tarih & Saat
      else if(s.step===3) {
        h += `<button class="btn-back" onclick="geriTarih()">${svgBack} ${t('back')}</button>`;
        h += `<div class="step-header"><span class="step-num">3</span><span class="step-label">${t('step3_title')}</span></div>`;
        const tarihler = yaklasTarihler();
        h += '<div class="date-scroll">';
        tarihler.forEach(tt => {
          h += `<div class="date-btn ${s.seciliTarih===tt.tarih?'selected':''}" onclick="secTarih('${tt.tarih}')">
            <div class="dn">${tt.bugun?t('today'):tt.gun}</div>
            <div class="dnum">${tt.gunNum}</div>
            <div class="dm">${tt.ay}</div>
          </div>`;
        });
        h += '</div>';
        if(s.seciliTarih) {
          if(s.yukleniyor) h += `<div class="loading"><div class="spin"></div>${t('loading_hours')}</div>`;
          else if(!s.saatler.length) h += `<div class="empty">${t('no_hours')}</div>`;
          else {
            h += '<div class="time-grid">';
            s.saatler.forEach(sa => { h += `<div class="time-btn ${s.seciliSaat===sa?'selected':''}" onclick="secSaat('${sa}')">${sa}</div>`; });
            h += '</div>';
          }
        }
        if(s.seciliSaat) h += `<button class="btn-go" onclick="adim(4)">${t('continue')}</button>`;
      }

      // Step 4 — Bilgiler
      else if(s.step===4) {
        h += `<button class="btn-back" onclick="adim(3)">${svgBack} ${t('back')}</button>`;
        h += `<div class="step-header"><span class="step-num">4</span><span class="step-label">${t('step4_title')}</span></div>`;
        h += `<div class="fg"><label>${t('name_label')}</label>
          <input type="text" id="musteriAd" value="${s.musteriAd}" placeholder="${t('name_placeholder')}" oninput="state.musteriAd=this.value;bilgiKontrol()" maxlength="60"></div>`;
        h += `<div class="fg"><label>${t('phone_label')}</label>
          <input type="tel" id="musteriTel" value="${s.musteriTel}" placeholder="${t('phone_placeholder')}" oninput="state.musteriTel=this.value;bilgiKontrol()" maxlength="15"></div>`;
        h += `<div style="position:absolute;left:-9999px"><input type="text" id="website" tabindex="-1" autocomplete="off"></div>`;
        h += `<div class="fg"><label>${t('captcha_label')}: ${s.captchaA} + ${s.captchaB} = ?</label>
          <input type="number" id="captchaInput" placeholder="${t('captcha_placeholder')}" oninput="state.captchaCevap=this.value;bilgiKontrol()"></div>`;
        h += `<div class="fg"><label>${t('note_label')}</label>
          <textarea id="musteriNot" placeholder="${t('note_placeholder')}" oninput="state.musteriNot=this.value">${s.musteriNot}</textarea></div>`;
        h += `<button class="btn-go" id="btnOzet" onclick="bilgiDevam()">${t('view_summary')}</button>`;
      }

      // Step 5 — Özet
      else if(s.step===5) {
        h += `<button class="btn-back" onclick="adim(4)">${svgBack} ${t('back')}</button>`;
        h += `<div class="step-header"><span class="step-num">5</span><span class="step-label">${t('step5_title')}</span></div>`;
        h += `<div class="summary">
          <div class="summary-row"><span>${t('service')}</span><span>${hizmetAdi(s.seciliHizmet?.isim)}</span></div>
          ${s.seciliCalisan?`<div class="summary-row"><span>${t('expert')}</span><span>${s.seciliCalisan.isim}</span></div>`:''}
          <div class="summary-row"><span>${t('date')}</span><span>${formatTarih(s.seciliTarih)}</span></div>
          <div class="summary-row"><span>${t('time')}</span><span>${s.seciliSaat}</span></div>
          <div class="summary-row"><span>${t('duration')}</span><span>${s.seciliHizmet?.sure_dk} ${t('minutes')}</span></div>
          ${s.seciliHizmet?.fiyat?`<div class="summary-row"><span>${t('price')}</span><span>${s.seciliHizmet.fiyat}₺</span></div>`:''}
          <div class="summary-row"><span>${t('full_name')}</span><span>${s.musteriAd}</span></div>
          <div class="summary-row"><span>${t('phone')}</span><span>${s.musteriTel}</span></div>
          ${s.musteriNot?`<div class="summary-row"><span>${t('note')}</span><span>${s.musteriNot}</span></div>`:''}
        </div>`;
        h += `<button class="btn-go" onclick="randevuOlustur()" ${s.yukleniyor?'disabled':''}>${s.yukleniyor?t('submitting'):t('confirm')}</button>`;
      }

      // Step 6 — Başarılı
      else if(s.step===6) {
        h += `<div class="success">
          <div class="success-ring">${svgCheck}</div>
          <h2>${t('success_title')}</h2>
          <p>
            <strong>${hizmetAdi(s.seciliHizmet?.isim)}</strong> ${t('for_text')}<br>
            <strong>${formatTarih(s.seciliTarih)}</strong> ${t('at_date')} <strong>${s.seciliSaat}</strong><br>
            ${t('success_msg')}<br><br>
            ${t('success_notify')}
          </p>
          <button class="btn-go" onclick="yeniRandevu()" style="margin-top:24px">${t('new_booking')}</button>
        </div>`;
      }

      h += `<div class="footer">Powered by <a href="https://xn--srago-n4a.com" target="_blank">SıraGO</a></div>`;
      app.innerHTML = h;
    }

    /* ─── actions ─── */
    async function init() {
      const data = await api(`/book/${slug}`);
      if(data.hata||!data.isletme) {
        document.getElementById('app').innerHTML = `<div style="text-align:center;padding:60px 0"><h2 style="margin-bottom:8px">${t('not_found_title')}</h2><p style="color:var(--muted)">${t('not_found_desc')}</p></div>`;
        return;
      }
      state.isletme = data.isletme;
      const hData = await api(`/book/${slug}/hizmetler`);
      state.hizmetler = hData.hizmetler || [];
      document.title = `${state.isletme.isim} - ${t('online_booking')}`;
      yeniCaptcha(); render();
    }

    async function secHizmet(id) {
      state.seciliHizmet = state.hizmetler.find(x=>x.id===id);
      state.hata = '';
      const cData = await api(`/book/${slug}/calisanlar?hizmetId=${id}`);
      state.calisanlar = cData.calisanlar||[];
      state.otomatikCalisan = cData.otomatik||false;
      state.calisanSecildi = false;
      render();
    }
    function secCalisan(id) { state.seciliCalisan = state.calisanlar.find(c=>c.id===id); state.calisanSecildi=true; state.hata=''; render(); }
    function secCalisanFarketmez() { state.seciliCalisan=null; state.calisanSecildi=true; state.hata=''; render(); }

    async function secTarih(tarih) {
      state.seciliTarih=tarih; state.seciliSaat=null; state.saatler=[]; state.yukleniyor=true; state.hata=''; render();
      const params = `?tarih=${tarih}&hizmetId=${state.seciliHizmet.id}${state.seciliCalisan?'&calisanId='+state.seciliCalisan.id:''}`;
      const data = await api(`/book/${slug}/saatler${params}`);
      state.saatler = data.saatler||[]; state.yukleniyor=false; render();
    }
    function secSaat(s) { state.seciliSaat=s; state.hata=''; render(); }

    function adim(step) { state.step=step; state.hata=''; render(); window.scrollTo(0,0); }
    function geriTarih() { state.otomatikCalisan||state.calisanlar.length<=1 ? adim(1) : adim(2); }

    function hizmetSonrasi() {
      if(state.otomatikCalisan||state.calisanlar.length===0) { state.seciliCalisan=null; adim(3); }
      else if(state.calisanlar.length===1) { state.seciliCalisan=state.calisanlar[0]; adim(3); }
      else adim(2);
    }

    function bilgiKontrol() {
      const btn = document.getElementById('btnOzet');
      if(btn) btn.disabled = !(state.musteriAd.trim()&&state.musteriTel.trim()&&state.captchaCevap);
    }
    function bilgiDevam() {
      const hp = document.getElementById('website');
      if(hp&&hp.value) { state.hata=t('err_invalid'); render(); return; }
      if(!state.musteriAd.trim()||!state.musteriTel.trim()) { state.hata=t('err_name_phone'); render(); return; }
      const tel = state.musteriTel.replace(/\s/g,'');
      if(!/^(05\d{9}|5\d{9}|905\d{9}|\+905\d{9})$/.test(tel)) { state.hata=t('err_phone_format'); render(); return; }
      if(parseInt(state.captchaCevap)!==state.captchaA+state.captchaB) { state.hata=t('err_captcha'); yeniCaptcha(); render(); return; }
      if(state.sonRandevuZaman&&Date.now()-state.sonRandevuZaman<60000) { state.hata=t('err_cooldown'); render(); return; }
      adim(5);
    }
    function yeniCaptcha() { state.captchaA=Math.floor(Math.random()*9)+1; state.captchaB=Math.floor(Math.random()*9)+1; state.captchaCevap=''; }

    async function randevuOlustur() {
      state.yukleniyor=true; state.hata=''; render();
      const tel = state.musteriTel.replace(/\s/g,'').replace(/^0/,'90');
      const body = {musteriTelefon:tel, musteriIsim:state.musteriAd, hizmetId:state.seciliHizmet.id, calisanId:state.seciliCalisan?.id||null, tarih:state.seciliTarih, saat:state.seciliSaat};
      const data = await apiPost(`/book/${slug}/randevu`, body);
      state.yukleniyor=false;
      if(data.hata) { state.hata=data.hata; render(); return; }
      state.sonRandevuZaman=Date.now(); state.step=6; render();
    }

    function yeniRandevu() {
      Object.assign(state, {step:1,seciliHizmet:null,seciliCalisan:null,seciliTarih:null,seciliSaat:null,saatler:[],musteriAd:'',musteriTel:'',musteriNot:'',hata:'',calisanSecildi:false});
      yeniCaptcha(); render();
    }

    init();
  </script>
</body>
</html>
